releaseNotes: "Security hardening and team management. Logout is now enforced server-side — signing out (or an admin forcing it) immediately invalidates the session token instead of leaving it valid for hours. Login attempts are rate-limited per client to blunt brute-force and credential stuffing. Cross-origin access is locked down, modern security headers (clickjacking, content-type, CSP) are sent, and the interactive API docs are no longer exposed publicly. Admins can now create, rename, and delete Teams directly from the Access tab, so findings and SSO group mappings can be assigned to a team without using the API. All changes are backward compatible and apply automatically on update."
