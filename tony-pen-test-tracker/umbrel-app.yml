releaseNotes: "New Dashboard tab — the app now opens to a risk overview (open findings by risk rating, SLA breaches, and upcoming BAU schedule) tailored to your role: admins see everything, team members see just their own team's findings. Also lays groundwork for an optional EasyVista (ITSM) ticket integration — off by default, no visible change unless an admin turns it on. All changes are backward compatible and apply automatically on update."
