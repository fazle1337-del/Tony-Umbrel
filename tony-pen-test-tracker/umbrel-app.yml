releaseNotes: "Enables Microsoft Entra ID single sign-on for this instance, with group-to-role mapping managed from the admin-only Access tab. The OIDC client secret is read from a file in the app's data directory, so it is never stored in the app config. Local username/password login remains available as a break-glass path. Before updating, create the secret file on the host (see the app README)."
