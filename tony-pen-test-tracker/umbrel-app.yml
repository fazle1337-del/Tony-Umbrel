name: Pen Test Tracker
tagline: Track pentest findings through remediation with RBAC
icon: https://cdn-icons-png.flaticon.com/512/2913/2913133.png
category: files & productivity
version: "0.7.0"
port: 8099
description: >-
  Ingest penetration test reports and track findings through remediation.
  InfoSec acts as admin — logging tests, recording findings with gross and
  net risk ratings, and assigning remediation owners. Other teams see only
  the findings they own and update status, notes, and evidence.


  This release (Phase 1 backend) includes role-based access control, tests
  with attached reports, findings with the full field set (gross/net risk,
  likelihood, impact, SLA status, resolver references), owner reassignment
  with history, and file attachments. Local accounts plus optional Microsoft
  Entra ID / OIDC single sign-on with group-to-role mapping (off by default
  until configured).


  First login: sign in as admin@example.com. The admin password is this app's
  Umbrel password — reveal it under the app's settings on your Umbrel
  dashboard, or run on your Umbrel host:
  `sudo docker exec tony-pen-test-tracker_api_1 printenv SEED_ADMIN_PASSWORD`.
  Change it after your first sign-in.
