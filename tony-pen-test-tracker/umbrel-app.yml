releaseNotes: "Bug fix: the new Dashboard's upcoming-schedule list only showed BAU calendar bookings, so tests imported via CSV (which don't create a booking) never appeared even with a real due date. The Dashboard now also lists upcoming tests that don't have a booking yet, without duplicating ones that do. All changes are backward compatible and apply automatically on update."
