releaseNotes: "Moved the app's host port from 8080 to 8099 to avoid a clash with Pi-hole on Umbrel. Also removed the default-credentials popup that appeared on launch (it could block navigation behind an HTTPS reverse proxy); first-login details now live in the app description here in the store. No backend or frontend changes."
