services:
  db:
    image: postgres:16-alpine
    container_name: macro-tracker-db-pwa
    restart: on-failure
    networks:
      - pwa_internal
    environment:
      POSTGRES_DB: macrotracker
      POSTGRES_USER: macrouser
      POSTGRES_PASSWORD: changeme123
    volumes:
      - ./data/db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U macrouser -d macrotracker"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: tonybooom/macro-tracker-api:latest
    container_name: macro-tracker-api-pwa
    restart: on-failure
    networks:
      - pwa_internal
      - umbrel_main_network
    environment:
      DATABASE_URL: postgres://macrouser:changeme123@db:5432/macrotracker
      API_SECRET: myapisecret123
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: tonybooom/macro-tracker-frontend:feature-pwa
    container_name: macro-tracker-frontend-pwa
    restart: on-failure
    networks:
      - pwa_internal
      - umbrel_main_network
    ports:
      - "8070:80"
    depends_on:
      - api

networks:
  pwa_internal:
    driver: bridge
  umbrel_main_network:
    external: true
