services:
  db:
    image: postgres:16-alpine
    container_name: macro-tracker-db-dev
    restart: on-failure
    environment:
      POSTGRES_DB: macrotracker
      POSTGRES_USER: macrouser
      POSTGRES_PASSWORD: changeme123
    volumes:
      - db_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U macrouser -d macrotracker"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: tonybooom/macro-tracker-api:latest
    container_name: macro-tracker-api-dev
    restart: on-failure
    environment:
      DATABASE_URL: postgres://macrouser:changeme123@macro-tracker-db-dev:5432/macrotracker
      API_SECRET: myapisecret123
      NODE_ENV: development
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: tonybooom/macro-tracker-frontend:feature-pwa
    container_name: macro-tracker-frontend-dev
    restart: on-failure
    ports:
      - "8070:80"
    depends_on:
      - api

volumes:
  db_data_dev:
