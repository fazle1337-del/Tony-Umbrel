services:
  db:
    image: postgres:16-alpine
    container_name: macro-tracker-db
    restart: on-failure
    environment:
      POSTGRES_DB: macrotracker
      POSTGRES_USER: macrouser
      POSTGRES_PASSWORD: changeme123
    volumes:
      - ${APP_DATA_DIR}/db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U macrouser -d macrotracker"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: tonybooom/macro-tracker-api:latest
    container_name: macro-tracker-api
    restart: on-failure
    environment:
      DATABASE_URL: postgres://macrouser:changeme123@macro-tracker-db:5432/macrotracker
      API_SECRET: myapisecret123
      NODE_ENV: production
      GITEA_URL: http://192.168.1.118:8085
      GITEA_TOKEN: "4a0de6748cf6b450bfce6a01aab186a8daa0da80"
      GITEA_OWNER: fazle1337
      GITEA_REPO: macro-tracker-backups
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: tonybooom/macro-tracker-frontend:latest
    container_name: macro-tracker-frontend
    restart: on-failure
    ports:
      - "8069:80"
    depends_on:
      - api
